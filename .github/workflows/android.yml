name: Android Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build Android APK/AAB
    runs-on: ubuntu-24.04
    env:
      CARGO_TERM_COLOR: always
      ANDROID_NDK_VERSION: "29.0.13846066"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.1.0" "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install frontend dependencies
        run: npm ci

      - name: Configure Android signing
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEY_BASE64" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Android signing secrets are not fully configured; building unsigned release artifacts."
            exit 0
          fi

          base64 -d <<< "$ANDROID_KEY_BASE64" > "$RUNNER_TEMP/android-release-key.jks"
          printf 'keyAlias=%s\npassword=%s\nstoreFile=%s\n' \
            "$ANDROID_KEY_ALIAS" \
            "$ANDROID_KEY_PASSWORD" \
            "$RUNNER_TEMP/android-release-key.jks" \
            > src-tauri/gen/android/keystore.properties

      - name: Build Android package
        run: npm run tauri -- android build --apk --aab --ci

      - name: Collect Android release assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release-assets
          find src-tauri/gen/android/app/build/outputs/apk -type f -name "*.apk" -exec cp {} release-assets/ \;
          find src-tauri/gen/android/app/build/outputs/bundle -type f -name "*.aab" -exec cp {} release-assets/ \;

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glosc-chat-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: error

      - name: Publish Android assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
